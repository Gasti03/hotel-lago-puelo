<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Nuestro Hotel - HLP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body>
    <header>
        <!-- Header estilo navbar para navegar por las paginas del sitio -->
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="../index.html">
                    <img width="60%" src="../images/logo.png" alt="Logotipo del hotel">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="../index.html">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./instalaciones.html">Conocenos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./contacto.html">Contactanos</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <h1>EL HOTEL</h1>
        <div class="imagenes-hotel">
            <!-- imagenes descriptivas de las instalaciones del hotel -->
            <figure>
                <!-- Foto de la fachada del hotel -->
                <img src="../images/fachada.jpg" alt="Foto de la fachada del hotel">
                <figcaption>Nuestro hotel se encuentra priviligiadamente ubicado en la entrada al lago puelo, uno de los paisajes mas atractivos de la patagonia argentina.</figcaption>
            </figure>
            <figure>
                <!-- Foto de una de las habitaciones del hotel con vista al lago -->
                <img src="../images/habitaciones.jpg"
                    alt="Foto desde las habitaciones con vista al lago">
                <figcaption>Las habitaciones aparte de su gran confort cuentan con un balcon con vista al lago, que las convierten en un lugar de descanso soñado.</figcaption>
            </figure>
            <figure>
                <!-- Foto del comedor del hotel -->
                <img src="../images/comedor.jpg" alt="Foto del comedor del hotel">
                <figcaption>Nuestro restaurant privado te invita a disfrutar de los mejores platos regionales, para que no tengas que preocuparte por nada.</figcaption>
            </figure>
            <figure>
                <!-- Foto de la playa privada del hotel -->
                <img src="../images/playa.jpg" alt="Foto de la playa privada">
                <figcaption>Esta es nuestra playa exclusiva para los clientes del hotel, donde vas a encontrar la paz que estabas buscando, ademas podes realizar las actividades al aire libre y dentro del lago.</figcaption>
            </figure>
        </div>
    </main>
    <footer>
        <p><em>Todos los derechos reservados.</em></p>
        <!-- Footer con enlaces para las redes sociales -->
        <section>
        <!-- Enlace al instagram del hotel -->
        <a href="http://instagram.com" target="_blank">
            <img src="../images/instagram-icon.png" alt="instagram-icon">
        </a>
        <!-- Enlace al chat de Whatsapp del hotel -->
        <a href="http://whatsapp.com" target="_blank">
            <img src="../images/whatsapp-icon.png" alt="whatsapp-icon">
        </a>
        <!-- Enlace a enviar un correo al mail del hotel -->
        <a href="http://gmail.com" target="_blank">
            <img src="../images/mail-icon.png" alt="mail-icon">
        </a>
        </section>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
